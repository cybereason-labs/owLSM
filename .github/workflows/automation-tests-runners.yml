name: Automation Tests Runners

# =============================================================================
# Provisions OCI compute instances from custom images and registers them
# as self-hosted GitHub Actions runners using Terraform.
# Designed to be called before the Automation Tests workflow.
#
# OCI credentials are pre-baked in the runner image at /home/ghrunner/.oci/
# (config file + private API key). Terraform uses them automatically.
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      artifact-name:
        description: "Name of the build artifact"
        required: true
        type: string
      destroy_runners:
        description: 'Destroy runner VMs after tests'
        type: boolean
        default: true
      ephemeral_runners:
        description: 'Make runners ephemeral (unregister after first job)'
        type: boolean
        default: true
      automation-tests-command-args:
        description: "Command to run automation tests"
        required: true
        type: string
        default: "features/ --junitxml=$AUTOMATION_ROOT_DIR/results.xml -v -s"
  workflow_call:
    inputs:
      artifact-name:
        description: "Name of the build artifact to download for automation tests"
        required: true
        type: string
      destroy_runners:
        description: 'Destroy runner VMs after tests'
        type: boolean
        default: true
      ephemeral_runners:
        description: 'Make runners ephemeral (unregister after first job)'
        type: boolean
        default: true
      automation-tests-command-args:
        description: "Command to run automation tests"
        required: false
        type: string
        default: "features/ --junitxml=$AUTOMATION_ROOT_DIR/results.xml -v -s"
    secrets:
      GH_RUNNER_PAT:
        required: true
      SSH_PUBLIC_KEY:
        required: true
    outputs:
      runners_ready:
        description: "Whether runners were successfully provisioned"
        value: ${{ jobs.provision-runners.outputs.runners_ready }}

env:
  TF_VAR_github_pat: ${{ secrets.GH_RUNNER_PAT }}
  TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
  TF_VAR_github_repo_url: ${{ github.server_url }}/${{ github.repository }}
  TF_VAR_run_id: ${{ github.run_id }}
  TF_VAR_ephemeral_runner: ${{ inputs.ephemeral_runners == '' && 'true' || inputs.ephemeral_runners }}
  TF_WORKING_DIR: terraform
  ALLOWED_FAILED_TESTS: 0
  ALLOWED_SKIPPED_TESTS: 0

jobs:
  provision-runners:
    name: Provision OCI Runner VMs
    runs-on: ["OCI", "owLSM"]
    outputs:
      runners_ready: ${{ steps.apply.outputs.runners_ready }}
      runner_labels: ${{ steps.runner_count.outputs.labels }}
      runner_count: ${{ steps.runner_count.outputs.count }}

    steps:
      # =====================================================================
      # Setup
      # =====================================================================
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Calculate expected runner count and labels
        id: runner_count
        run: |
          TFVARS="${{ env.TF_WORKING_DIR }}/runners.auto.tfvars.json"
          COUNT=$(jq '.runners | length' "$TFVARS")
          LABELS=$(jq -c '[.runners[].runner_labels[0]]' "$TFVARS")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "labels=$LABELS" >> $GITHUB_OUTPUT
          echo "Expected runners: $COUNT"
          echo "Runner labels: $LABELS"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.4"
          terraform_wrapper: false

      # =====================================================================
      # Terraform Init
      # =====================================================================
      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      # =====================================================================
      # Plan & Apply
      # =====================================================================
      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        id: apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -auto-approve tfplan
          echo "runners_ready=true" >> $GITHUB_OUTPUT

      # =====================================================================
      # Wait for Runners to Register
      # =====================================================================
      - name: Wait for runners to become available
        id: wait_runners
        if: steps.apply.outputs.runners_ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_RUNNER_PAT }}
        run: |
          set +e
          ${{ env.TF_WORKING_DIR }}/scripts/wait-for-runners.sh \
            "${{ github.repository }}" \
            "run-${{ github.run_id }}" \
            "${{ steps.runner_count.outputs.count }}" \
            "${{ env.TF_WORKING_DIR }}/runners.auto.tfvars.json" \
            500
          
          EXIT_CODE=$?
          echo "wait_exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          if [ "$EXIT_CODE" -eq 0 ]; then
            exit 0
          elif [ "$EXIT_CODE" -eq 2 ]; then
            echo "::warning::Some runners failed to register. Will retry failed instances."
            exit 0
          else
            echo "::error::No runners came online."
            exit 1
          fi

      # =====================================================================
      # Retry Failed Runners
      # =====================================================================
      - name: Retry failed runners
        id: retry_runners
        if: steps.wait_runners.outputs.wait_exit_code == '2'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          GH_TOKEN: ${{ secrets.GH_RUNNER_PAT }}
        run: |
          FAILED='${{ steps.wait_runners.outputs.failed_runners }}'
          echo "==> Failed runners to retry: $FAILED"

          TARGET_FLAGS=""
          for key in $(echo "$FAILED" | jq -r '.[]'); do
            RESOURCE="oci_core_instance.gh_runner[\"$key\"]"
            echo "==> Tainting $RESOURCE..."
            terraform taint "$RESOURCE"
            TARGET_FLAGS="$TARGET_FLAGS -target=$RESOURCE"
          done

          echo "==> Re-applying Terraform (only failed instances)..."
          terraform apply -auto-approve $TARGET_FLAGS

          FAILED_COUNT=$(echo "$FAILED" | jq 'length')
          echo "==> Waiting for $FAILED_COUNT re-provisioned runner(s)..."

          set +e
          scripts/wait-for-runners.sh \
            "${{ github.repository }}" \
            "run-${{ github.run_id }}" \
            "${{ steps.runner_count.outputs.count }}" \
            "runners.auto.tfvars.json"
          
          RETRY_EXIT=$?
          set -e

          if [ "$RETRY_EXIT" -eq 0 ]; then
            echo "==> All runners online after retry!"
          else
            echo "::error::Runners still not online after retry (exit=$RETRY_EXIT)."
            exit 1
          fi

      # =====================================================================
      # Summary
      # =====================================================================
      - name: Summary
        if: always()
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "## Prepare Runners Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action:** Provision runners" >> $GITHUB_STEP_SUMMARY

          # Try to get IPs from Terraform output
          if terraform output -json runner_public_ips 2>/dev/null; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Runner IPs" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            terraform output -json runner_public_ips >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup workspace
        if: always()
        run: |
          cd ${{ github.workspace }}
          sudo git clean -ffdx
          echo "==> Cleanup completed!"

  # =====================================================================
  # Run Automation Tests on Each Provisioned Runner (dynamic matrix)
  # =====================================================================
  # Matrix is generated from display_name values in
  # terraform/runners.auto.tfvars.json
  # =====================================================================

  run-automation-tests:
    name: "Automation Tests (${{ matrix.runner-label }})"
    needs: provision-runners
    if: needs.provision-runners.outputs.runners_ready == 'true'
    strategy:
      fail-fast: false
      matrix:
        runner-label: ${{ fromJSON(needs.provision-runners.outputs.runner_labels) }}
    uses: ./.github/workflows/automation-tests.yml
    with:
      runner-label: ${{ matrix.runner-label }}
      artifact-name: ${{ inputs.artifact-name }}
      automation-tests-command-args: ${{ inputs.automation-tests-command-args }}
    secrets:
      GH_RUNNER_PAT: ${{ secrets.GH_RUNNER_PAT }}

  # =====================================================================
  # Aggregate Test Results from All Runners
  # =====================================================================

  aggregate-results:
    name: Aggregate Test Results
    needs: [provision-runners, run-automation-tests]
    if: always() && needs.provision-runners.outputs.runners_ready == 'true'
    runs-on: ["OCI", "owLSM"]
    env:
      RESULTS_DIR: all-results

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download all test result artifacts
        uses: actions/download-artifact@v5
        with:
          path: ${{ env.RESULTS_DIR }}
          pattern: automation-test-results-*
          merge-multiple: true

      - name: List downloaded results
        run: ls -la ${{ env.RESULTS_DIR }}/

      - name: Run aggregation script
        run: |
          cd scripts/aggregate_automation_results
          uv venv venv --clear
          source venv/bin/activate
          uv pip install -r requirements.txt
          python3 aggregate_results.py \
            ${{ github.workspace }}/${{ env.RESULTS_DIR }} \
            ${{ needs.provision-runners.outputs.runner_count }} \
            ${{ github.workspace }}/aggregated-results/aggregated_results.json

      - name: Validate test results
        run: |
          FAILED=$(jq '.total_number_of_failed_tests' aggregated-results/aggregated_results.json)
          SKIPPED=$(jq '.total_number_of_skipped_tests' aggregated-results/aggregated_results.json)
          echo "Failed tests: $FAILED (allowed: ${{ env.ALLOWED_FAILED_TESTS }})"
          echo "Skipped tests: $SKIPPED (allowed: ${{ env.ALLOWED_SKIPPED_TESTS }})"
          if [ "$FAILED" -gt "${{ env.ALLOWED_FAILED_TESTS }}" ] || [ "$SKIPPED" -gt "${{ env.ALLOWED_SKIPPED_TESTS }}" ]; then
            echo "::error::Test thresholds exceeded — failed: $FAILED, skipped: $SKIPPED"
            exit 1
          fi

      - name: Upload aggregated results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: aggregated-test-results
          path: aggregated-results/aggregated_results.json
          retention-days: 30
      
      - name: Cleanup workspace
        if: always()
        run: |
          cd ${{ github.workspace }}
          sudo git clean -ffdx
          echo "==> Cleanup completed!"

  # =====================================================================
  # Destroy Ephemeral Runners via Terraform
  # =====================================================================

  destroy-runners:
    name: Destroy OCI Runner VMs
    needs: [provision-runners, run-automation-tests, aggregate-results]
    if: >-
      always() &&
      inputs.destroy_runners == true &&
      needs.run-automation-tests.result == 'success'
    uses: ./.github/workflows/destroy-runners.yml
    secrets:
      GH_RUNNER_PAT: ${{ secrets.GH_RUNNER_PAT }}
      SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
